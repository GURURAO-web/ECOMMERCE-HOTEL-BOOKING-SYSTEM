<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hotel Reservation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <img src="logo2.jpg" alt="Hotel Logo">
        </div>
        <div class="title">
            HOTEL RESERVATION
        </div>
        <div class="nav-links">
            <a href="home.html" class="login-btn" style="margin-right: 15px; text-decoration: none; font-weight: bold;">Home</a>
             <a href="signup.html" class="login-btn" style="margin-right: 15px; text-decoration: none; font-weight: bold;">Sign Up</a>
            <a href="login.html" class="login-btn" style="margin-right: 15px; text-decoration: none; font-weight: bold; background-color: gray;">Login</a>
            <a href="reservation.html" class="login-btn" style="margin-right: 15px; text-decoration: none; font-weight: bold;">Reservation</a>
            <a href="about.html" class="login-btn" style="margin-right: 15px; text-decoration: none; font-weight: bold;">About</a>
            <a href="contact.html" class="login-btn" style="margin-right: 15px; text-decoration: none; font-weight: bold;">Contact</a>
        </div>
    </div>
   

   <!-- Login Form -->
<div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Enter Username" required>
        <input type="password" id="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>
    <p style="margin-top: 15px;">
        Don't have an account? <a href="signup.html" style="color: #4CAF50;">Sign up</a>
    </p>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Please enter both username and password.");
        return;
    }

    try {
        const response = await fetch("http://localhost:4000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            alert("✅ Login successful!");
            localStorage.setItem("token", data.token);
            localStorage.setItem("username", username);
            window.location.href = "reservation.html";
        } else {
            alert("❌ " + data.message);
        }
    } catch (err) {
        alert("Error connecting to server.");
    }
});
</script>

</body>
</html>
